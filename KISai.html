<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA 리포트 취합 및 비교 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Gemini가 출력하는 마크다운 테이블 및 결과물 스타일링 */
        .report-content h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 1rem; color: #0f172a; text-align: center; }
        .report-content h2 { font-size: 1.2rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #1e3a8a; border-left: 4px solid #1e3a8a; padding-left: 0.5rem; }
        .report-content p { margin-bottom: 0.5rem; line-height: 1.5; color: #334155; font-size: 0.9rem; }
        .report-content ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 0.75rem; font-size: 0.9rem; }
        .report-content li { margin-bottom: 0.25rem; color: #334155; }
        
        /* 증권사별 비교 표 스타일 */
        .report-content table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.85rem; }
        .report-content th, .report-content td { border: 1px solid #cbd5e1; padding: 0.4rem; text-align: left; }
        .report-content th { background-color: #f8fafc; font-weight: 600; color: #1e293b; }
        
        /* 인쇄 시 A4 세로 1장 최적화 설정 */
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .print-area { border: none !important; shadow: none !important; padding: 0 !important; width: 100% !important; max-width: 100% !important; }
            .report-content { font-size: 11px !important; }
            .report-content h1 { font-size: 1.5rem !important; }
            .report-content h2 { font-size: 1.1rem !important; margin-top: 1rem !important; }
            .report-content table { font-size: 10px !important; }
            th, td { padding: 0.25rem !important; }
        }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen py-8 px-4">

    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-1 space-y-4 no-print">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">⚙️ 시스템 설정</h2>
                    
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Gemini API Key</label>
                        <input type="password" id="apiKey" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="AI Studio 키 입력">
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-slate-600 mb-2">증권사 리포트 업로드 (복수 선택 가능)</label>
                        <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-slate-300 border-dashed rounded-lg cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
                            <div class="flex flex-col items-center justify-center pt-4 pb-4 text-center px-2">
                                <svg class="w-6 h-6 mb-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                                <p id="fileStatus" class="text-xs text-slate-500"><span class="font-semibold">파일들을 선택하세요</span></p>
                            </div>
                            <input id="fileInput" type="file" accept="application/pdf" multiple class="hidden" />
                        </label>
                    </div>

                    <button id="analyzeBtn" class="w-full bg-slate-900 text-white font-medium py-2.5 px-4 rounded-lg hover:bg-slate-800 transition shadow-sm disabled:bg-slate-300 disabled:cursor-not-allowed">
                        원페이퍼 분석 생성
                    </button>
                </div>

                <button id="printBtn" class="w-full bg-white border border-slate-300 text-slate-700 font-medium py-2 px-4 rounded-lg hover:bg-slate-50 transition shadow-sm hidden flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                    A4 원페이퍼 인쇄 / PDF 저장
                </button>
            </div>

            <div class="lg:col-span-3">
                <div class="print-area bg-white p-8 rounded-xl shadow-sm border border-slate-200 min-h-[842px] flex flex-col justify-between">
                    
                    <div id="reportOutput" class="report-content flex-1 text-slate-400 flex flex-col items-center justify-center text-center">
                        <svg class="w-16 h-16 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <p class="text-slate-500 font-medium">분석할 증권사 리포트 PDF 파일들을 업로드한 뒤<br>'원페이퍼 분석 생성' 버튼을 눌러주세요.</p>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        let uploadedFiles = [];

        // 파일 선택 처리 (다중 파일 대응)
        document.getElementById('fileInput').addEventListener('change', function(e) {
            uploadedFiles = Array.from(e.target.files);
            const statusText = document.getElementById('fileStatus');
            if (uploadedFiles.length > 0) {
                statusText.innerHTML = `<span class="text-blue-600 font-bold">${uploadedFiles.length}개의 리포트</span>가 선택됨`;
            } else {
                statusText.innerText = "파일들을 선택하세요";
            }
        });

        // 인쇄 버튼 이벤트
        document.getElementById('printBtn').addEventListener('click', () => { window.print(); });

        // 핵심 실행 로직
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const outputDiv = document.getElementById('reportOutput');
            const printBtn = document.getElementById('printBtn');

            if (!apiKey) { alert('Gemini API Key를 입력해주세요.'); return; }
            if (uploadedFiles.length === 0) { alert('최소 1개 이상의 PDF 리포트 파일을 선택해주세요.'); return; }

            outputDiv.classList.remove('text-slate-400');
            outputDiv.innerHTML = `<div class="text-slate-600 text-center py-32 font-medium animate-pulse">📚 복수의 리포트 PDF 분석 및 중간값 연산 중입니다...<br><span class="text-xs text-slate-400">잠시만 기다려주세요 (약 10~20초 소요)</span></div>`;

            try {
                // 1. 모든 PDF 파일을 Base64 파트로 변환
                const fileParts = await Promise.all(uploadedFiles.map(async (file) => {
                    const base64Data = await fileToBase64(file);
                    return {
                        inlineData: {
                            mimeType: "application/pdf",
                            data: base64Data.split(',')[1]
                        }
                    };
                }));

                // 2. 유저가 제공한 완벽한 젬(Gem) 지시문 주입
                const promptInstruction = `
너는 국내 증권사 리서치를 취합·비교하는 RA(리서치 어시스턴트)다.
첨부된 여러 증권사의 종목 리포트 PDF를 모두 읽고, 아래 규칙에 정확히 맞추어 가독성 높은 마크다운(Markdown) 보고서로 출력하라. 최종 인쇄 시 A4 세로 1장 분량을 넘기지 않도록 군더더기 없이 압축하여 작성하라.

[입력 데이터 처리]
- 각 PDF에서 증권사명, 발행일, 투자의견, 목표주가, 분기별 영업이익 추정치, 핵심 논거, 리스크를 추출할 것.

[출력 구조 — 위에서 아래 순서 절대 고정]
1) 타이틀 영역:
   - # [종목명 (종목코드)] 형태로 작성.
   - 목표주가 범위: 최저 ~ 최고 범위를 표기하고, 각각 옆에 해당 증권사명을 작은 괄호 라벨로 명시 (예: 78,000원(A증권) ~ 105,000원(C증권)). 집계에 사용한 총 증권사 수도 함께 한 줄로 명시할 것.
2) 공통 인사이트:
   - ## 공통 인사이트
   - 다수 증권사가 공통으로 언급한 투자포인트/전망을 3~5개 불릿(bullet) 리스트로 작성.
   - 각 항목 끝에 몇 개사가 공통으로 본 관점인지 명확히 표기 (예: 5개사 공통).
3) 증권사별 관점 비교표:
   - ## 증권사별 관점 비교
   - Markdown 표(Table) 양식으로 작성할 것.
   - 컬럼(열): 증권사 | 투자의견 | 목표주가 | 밸류에이션 근거 | 핵심 논거 | 주요 리스크
   - 타 증권사와 시각이 갈리거나 대조되는 지점이 있다면 셀 안의 텍스트에 강세를 주어 명확히 드러낼 것.
4) 하단 실적 추이 요약 (차트 대용 데이터 표):
   - ## 분기별 영업이익 추이 및 전망
   - 대시보드 내 시각적 구분을 대체할 수 있도록, [실적 구간(직전 4개 분기)]과 [예상 구간(향후 4개 분기)]을 명확히 분리한 구조화된 표 또는 텍스트 밴드로 생성하라.
   - 직전 4개 분기는 리포트에 기재된 실제 발표 실적을 기재.
   - 향후 4개 분기는 각 증권사 추정치의 "중간값(median)"을 계산해 표기하고, 해당 분기의 [최고/최저 값 밴드]를 함께 표시하라 (예: 2Q26(E) 중간값 450억 (밴드: 400억 ~ 510억)).
   - 중간값 계산 시 사용한 증권사 개수와 짝/홀수 처리는 통계 원칙에 맞게 일관되게 처리할 것.

[엄수 규칙]
- 리포트에 없는 수치는 절대 임의로 조작하거나 유추하지 말고 "N/A"로 명확히 표기.
- 모든 수치·주장에는 출처 증권사를 유추할 수 있도록 괄호 등으로 출처를 명시할 것.
- 전체 내용은 자연스럽고 전문적인 한국어로 작성할 것.
- 인쇄 시 A4 세로 1장을 절대 넘기지 않도록 간결하고 함축적인 문장을 사용할 것.
- 별도의 대화문이나 서론, 결론, 안내 문구 없이 오직 위 구조에 따른 보고서 본문만 바로 출력할 것.
`;

                // 3. API 요청 컨텐츠 배열 구성 (파일들 + 프롬프트 텍스트)
                const contents = [
                    {
                        parts: [
                            ...fileParts,
                            { text: promptInstruction }
                        ]
                    }
                ];

                // 4. Gemini 2.5 Flash API 호출
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents })
                });

                const result = await response.json();
                
                if (result.candidates && result.candidates[0].content.parts[0].text) {
                    const markdownText = result.candidates[0].content.parts[0].text;
                    // 마크다운 파싱 및 주입
                    outputDiv.innerHTML = marked.parse(markdownText);
                    printBtn.classList.remove('hidden'); // 완성 시 인쇄 버튼 활성화
                } else {
                    throw new Error("분석 결과 데이터를 가져오지 못했습니다. API Key나 파일을 확인하세요.");
                }

            } catch (error) {
                console.error(error);
                outputDiv.innerHTML = `<div class="text-red-500 text-center py-20 font-medium">❌ 에러가 발생했습니다.<br><span class="text-xs">${error.message}</span></div>`;
            }
        });

        // FileReader 호출 헬퍼
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>
</html>
